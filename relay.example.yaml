# Relay gateway configuration.
#
# Values of the form ${VAR} or ${VAR:-default} are expanded from the process
# environment at startup, so secrets never live in this file. Copy it to
# relay.yaml (git-ignored) and set the referenced environment variables.

server:
  addr: ${RELAY_ADDR:-:8080}          # public OpenAI-compatible API
  admin_addr: ${RELAY_ADMIN_ADDR:-:9090} # metrics, analytics API, dashboard
  read_timeout: 60s
  shutdown_timeout: 20s
  admin_token: ${RELAY_ADMIN_TOKEN:-change-me-admin-token}

redis:
  addr: ${REDIS_ADDR:-localhost:6379}
  password: ${REDIS_PASSWORD:-}
  db: 0
  backend: ${RELAY_BACKEND:-redis}    # "redis" (requires redis-stack) or "memory"

cache:
  enabled: true
  similarity_threshold: 0.92          # cosine similarity required for a hit
  ttl: 24h
  max_candidates: 5
  namespace: prod

router:
  strategy: auto                      # auto | cost | quality
  cheap_model: gpt-4o-mini
  strong_model: gpt-4o
  complexity_threshold: 0.55          # >= routes to the strong model
  max_retries: 2
  retry_backoff: 200ms

embedding:
  provider: openai
  model: text-embedding-3-small
  dimensions: 1536

providers:
  - name: openai
    kind: openai
    base_url: https://api.openai.com/v1
    api_key: ${OPENAI_API_KEY}
    timeout: 120s

  - name: anthropic
    kind: anthropic
    base_url: https://api.anthropic.com/v1
    api_key: ${ANTHROPIC_API_KEY}
    timeout: 120s

  # A self-hosted, OpenAI-compatible server (vLLM, Ollama, TGI, ...).
  - name: local
    kind: local
    base_url: ${LOCAL_LLM_URL:-http://localhost:11434/v1}
    api_key: ${LOCAL_LLM_KEY:-}
    timeout: 120s

models:
  - name: gpt-4o-mini
    provider: openai
    upstream: gpt-4o-mini
    tier: cheap
    input_price_per_m: 0.15
    output_price_per_m: 0.60
    fallbacks: [claude-3-5-haiku, llama-3.1-8b]

  - name: gpt-4o
    provider: openai
    upstream: gpt-4o
    tier: strong
    input_price_per_m: 2.50
    output_price_per_m: 10.00
    fallbacks: [claude-3-5-sonnet]

  - name: claude-3-5-sonnet
    provider: anthropic
    upstream: claude-3-5-sonnet-20241022
    tier: strong
    input_price_per_m: 3.00
    output_price_per_m: 15.00

  - name: claude-3-5-haiku
    provider: anthropic
    upstream: claude-3-5-haiku-20241022
    tier: cheap
    input_price_per_m: 0.80
    output_price_per_m: 4.00

  - name: llama-3.1-8b
    provider: local
    upstream: llama3.1:8b
    tier: cheap
    input_price_per_m: 0.0
    output_price_per_m: 0.0

  - name: text-embedding-3-small
    provider: openai
    upstream: text-embedding-3-small
    input_price_per_m: 0.02
    output_price_per_m: 0.0

api_keys:
  - key: ${RELAY_KEY_TEAM_A:-sk-relay-team-a}
    name: team-a
    rate_limit_rpm: 600
    monthly_budget_usd: 2000
    allowed_models: []                # empty = all models

  - key: ${RELAY_KEY_TEAM_B:-sk-relay-team-b}
    name: team-b
    rate_limit_rpm: 120
    monthly_budget_usd: 250
    allowed_models: [gpt-4o-mini, claude-3-5-haiku, auto, cost]

telemetry:
  service_name: relay
  otlp_endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}   # e.g. otel-collector:4318
  trace_sampling: 1.0
  metrics_enabled: true
