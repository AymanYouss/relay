# Example secret. Do NOT commit real values. In production, source these from
# AWS Secrets Manager via the External Secrets Operator or CSI driver rather
# than a static manifest.
apiVersion: v1
kind: Secret
metadata:
  name: relay-secrets
  namespace: relay
type: Opaque
stringData:
  RELAY_ADMIN_TOKEN: "replace-with-strong-token"
  REDIS_ADDR: "relay-redis.xxxxxx.ng.0001.use1.cache.amazonaws.com:6379"
  REDIS_PASSWORD: ""
  OPENAI_API_KEY: "sk-..."
  ANTHROPIC_API_KEY: "sk-ant-..."
  RELAY_KEY_TEAM_A: "sk-relay-team-a"
  RELAY_KEY_TEAM_B: "sk-relay-team-b"
