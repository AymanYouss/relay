version: "2"
run:
  tests: true
linters:
  enable:
    - bodyclose
    - misspell
    - unconvert
  settings:
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - bodyclose
          - errcheck
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/AymanYouss/relay
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
