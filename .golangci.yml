run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - bodyclose
    - gofmt
    - goimports

linters-settings:
  goimports:
    local-prefixes: github.com/AymanYouss/relay
  misspell:
    locale: US

issues:
  exclude-rules:
    # Test files may ignore some errors for brevity.
    - path: _test\.go
      linters:
        - errcheck
        - bodyclose
  max-issues-per-linter: 0
  max-same-issues: 0
